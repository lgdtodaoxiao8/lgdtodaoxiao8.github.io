<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кулинарный блог — Диаграммы</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #fdf6f0;
        }
        .chart-container {
            width: 80%;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>Распределение рецептов по категориям</h2>
        <canvas id="polarChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Топ-5 рецептов по просмотрам</h2>
        <canvas id="barChart"></canvas>
    </div>

    <script>
        // Polar Area: категории рецептов
        const polarData = {
            labels: ['Десерты', 'Салаты', 'Завтраки', 'Супы', 'Основные блюда'],
            datasets: [{
                label: 'Количество рецептов',
                data: [12, 8, 10, 5, 15],
                backgroundColor: [
                    '#f38b4a',
                    '#56d798',
                    '#ff8397',
                    '#6970d5',
                    '#ffe29a'
                ],
                borderWidth: 1
            }]
        };

        const polarOptions = {
            responsive: true,
            plugins: {
                tooltip: { enabled: true },
                legend: { position: 'right' }
            },
            animation: {
                animateRotate: true,
                duration: 1500
            }
        };

        const ctxPolar = document.getElementById('polarChart').getContext('2d');
        new Chart(ctxPolar, {
            type: 'polarArea',
            data: polarData,
            options: polarOptions
        });

        // Bar: просмотры рецептов
        const barData = {
            labels: ['Шоколадный торт', 'Овсянка с фруктами', 'Греческий салат', 'Борщ', 'Паста с соусом'],
            datasets: [{
                label: 'Просмотры',
                data: [2500, 1800, 1400, 1000, 2200],
                backgroundColor: '#56d798',
                borderColor: '#3cb57c',
                borderWidth: 1
            }]
        };

        const barOptions = {
            responsive: true,
            plugins: {
                tooltip: { enabled: true },
                legend: { display: true, position: 'top' }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 500 }
                }
            },
            animation: {
                duration: 2000
            }
        };

        const ctxBar = document.getElementById('barChart').getContext('2d');
        new Chart(ctxBar, {
            type: 'bar',
            data: barData,
            options: barOptions
        });
    </script>
</body>
</html>
